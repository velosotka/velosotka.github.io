# https://web.archive.org/web/20230921095117/https://velosotka.kyiv.ua/podiya-ta-format/
content: |
  Незважаючи на війну в Україні, організатори вирішили відновити проведення Київської Сотки після <a href="#2022" class="smooth-scroll-middle">року</a> перерви.
  Організатори <a href="https://www.facebook.com/velo100ka/posts/pfbid0QCDLgaqYoASNVDrtqFCdpRgktZMNMPqbRQSepdfRCEZ2KqZPEzNikQfDbr6nrKqYl" target="_blank">написали</a> наступне про маршрут:
  <blockquote>
  У викличний час не може бути простих маршрутів.
  Ми знову повертаємось до Обухівсько-Васильківського напрямку. Так-так, знову: Вали, Космос (двічі), "Олімпійський трек" на самому кінці дистанції 🙂
  Урочистий старт та зона нагородження на ВДНГ.
  </blockquote>
